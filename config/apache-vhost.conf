# =====================================================================
# AR Radius - Apache VirtualHost
# Listens on port @@WEB_PORT@@
# =====================================================================
<VirtualHost *:@@WEB_PORT@@>
    ServerName ar-radius
    DocumentRoot @@WEB_DIR@@

    <Directory @@WEB_DIR@@>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Block access to includes/, sql/, scripts/
    <DirectoryMatch "^@@WEB_DIR@@/(includes|api/internal)">
        Require all denied
    </DirectoryMatch>

    <FilesMatch "\.(env|sql|sh|md|gitignore)$">
        Require all denied
    </FilesMatch>

    # Hardening headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set X-XSS-Protection "1; mode=block"

    # PHP settings
    php_admin_value session.cookie_httponly 1
    php_admin_value session.use_strict_mode 1
    php_admin_value expose_php Off

    ErrorLog ${APACHE_LOG_DIR}/ar-radius-error.log
    CustomLog ${APACHE_LOG_DIR}/ar-radius-access.log combined
</VirtualHost>
